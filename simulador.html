<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Crédito</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="simulador.css">

<script src="funciones.js"></script>
<script src="simulador.js"></script>
</head>

<body>

<!-- HEADER -->
<header class="topbar">
    <img src="BanColombia.png" class="logo">
    <span class="brand"></span>
</header>

<!-- CONTENIDO -->
<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <h2>Datos financieros</h2>

        <div class="field">
            <label>Ingresos</label>
            <input type="text" id="txtIngresos" placeholder="$ 0">
            <small class="error"></small>
        </div>

        <div class="field">
            <label>Egresos</label>
            <input type="text" id="txtEgresos">
            <small class="error"></small>
        </div>

        <div class="result">
            <p>Disponible <span id="spnDisponible"></span></p>
            <p>Capacidad <span id="spnCapacidadPago"></span></p>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <h2>Solicitud</h2>

        <div class="field">
            <label>Monto</label>
            <input type="text" id="txtMonto">
        </div>

        <div class="field">
            <label>Plazo</label>
            <input type="text" id="txtPlazo">
        </div>

        <div class="field">
            <label>Interés</label>
            <input type="text" id="txtTasaInteres">
        </div>

        <div class="result">
            <p>Interés <span id="spnInteresPagar"></span></p>
            <p>Total <span id="spnTotalPrestamo"></span></p>
            <p>Cuota <span id="spnCuotaMensual"></span></p>

            <p class="estado">
                Estado 
                <span id="spnEstadoCredito" class="estado-text">Analizando...</span>
            </p>
        </div>
    </div>

    <!-- BOTONES -->
    <div class="buttons">
        <button class="primary" onclick="calcular()">Calcular</button>
        <button class="secondary" id="btnReiniciar">Reiniciar</button>
    </div>

</div>

</body>
</html>
