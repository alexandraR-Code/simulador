<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Crédito</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="simulador.css">

<script src="funciones.js"></script>
<script src="simulador.js"></script>
</head>

<body>

<!-- HEADER -->
<header class="topbar">
    <img src="BanColombia.png" class="logo">
    <span class="brand"></span>
</header>

<!-- CONTENIDO -->
<div class="container">

    <!-- CARD 1 -->
    <div class="card">
        <h2>Datos financieros</h2>

        <div class="field">
            <label>Ingresos</label>
            <span>$</span>
            <input type="text" id="txtIngresos" placeholder="0">
            <small id="errorIngresos" class="error"></small>
        </div>

        <div class="field">
            <label>Egresos</label>
            <span>$</span>
            <input type="text" id="txtEgresos" placeholder="0">
            <small id="errorEgresos" class="error"></small>
        </div>

        <div class="result">
            <p>Disponible <span id="spnDisponible"></span></p>
            <p>Capacidad <span id="spnCapacidadPago"></span></p>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
        <h2>Solicitud</h2>

        <div class="field">
            <label>Monto</label>
            <span>$</span>
            <input type="text" id="txtMonto" placeholder="0">
            <small id="errorMonto" class="error"></small>
        </div>

        <div class="field">
            <label>Plazo</label>
            <input type="text" id="txtPlazo" placeholder="0">
            <small id="errorPlazo" class="error"></small>
        </div>

        <div class="field">
            <label>Interés</label>
            <div class="opciones-interes">
                <button onclick="seleccionarInteres(5, this)">5%</button>
                <button onclick="seleccionarInteres(10, this)">10%</button>
                <button onclick="seleccionarInteres(15, this)">15%</button>
            </div>
            <small id="errorInteres" class="error"></small>
        </div>

        <div class="result">
            <p>Interés <span id="spnInteresPagar"></span></p>
            <p>Total <span id="spnTotalPrestamo"></span></p>
            <p>Cuota <span id="spnCuotaMensual"></span></p>

            <p class="estado">
                Estado 
                <span id="spnEstadoCredito" class="estado-text">Analizando...</span>
            </p>
        </div>
    </div>

    <!-- BOTONES -->
    <div class="buttons">
        <button class="primary" onclick="calcular()">Calcular</button>
        <button class="secondary" id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
    </div>

</div>

</body>
</html>
